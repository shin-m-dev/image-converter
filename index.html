<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一括画像リサイズ&変換ツール</title>
    <!-- ファビコン設定 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f46e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='3' width='18' height='18' rx='2' ry='2'/%3E%3Ccircle cx='8.5' cy='8.5' r='1.5'/%3E%3Cpolyline points='21 15 16 10 5 21'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ZIP圧縮とファイル保存のためのライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- 高品質リサイズ（Lanczos3 + アンシャープマスク） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pica/9.0.1/pica.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
        }

        .drag-active {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            transform: scale(1.01);
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 削除時のアニメーション */
        .fade-out {
            animation: fadeOut 0.2s ease-in-out forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }

        /* スクロールバー設定 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* レンジスライダーのカスタムスタイル */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e5e7eb;
            border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen p-4 text-gray-700 flex flex-col items-center">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden mb-8">
        <!-- ヘッダー -->
        <div class="bg-indigo-600 p-6 text-center text-white relative overflow-hidden">
            <div class="relative z-10 flex flex-col items-center justify-center">
                <div class="flex items-center gap-3 mb-2">
                    <svg class="w-8 h-8 text-indigo-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <h1 class="text-2xl font-bold">一括画像リサイズ&変換ツール</h1>
                </div>
                <p class="text-indigo-100 text-sm">Lanczos3高品質リサイズ・形式変換・ZIP一括ダウンロードに対応</p>
            </div>
            <!-- 装飾用の背景円 -->
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
                <div class="absolute -top-10 -left-10 w-40 h-40 bg-white rounded-full mix-blend-overlay"></div>
                <div class="absolute top-10 right-10 w-20 h-20 bg-white rounded-full mix-blend-overlay"></div>
            </div>
        </div>

        <div class="p-6 md:p-8">

            <!-- 設定パネル -->
            <div class="bg-gray-50 border border-gray-200 rounded-xl p-5 mb-6 shadow-sm">
                <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center justify-between">
                    <div class="flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        出力設定
                    </div>
                    <!-- プライバシー保護バッジ -->
                    <span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full border border-green-200 flex items-center">
                        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                        Exif情報は自動削除されます
                    </span>
                </h2>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <!-- 1. サイズ指定 -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-2">長辺サイズ (px)</label>
                        <!-- プリセットボタン (サイズ) -->
                        <div class="flex flex-wrap gap-1.5 mb-2" id="size-presets">
                            <button type="button" data-value="1200" class="px-2 py-1 text-[10px] sm:text-xs border border-gray-300 text-gray-600 rounded transition-colors hover:bg-gray-100">1200</button>
                            <button type="button" data-value="1000" class="px-2 py-1 text-[10px] sm:text-xs border border-indigo-500 bg-indigo-50 text-indigo-700 rounded transition-colors font-medium">1000</button>
                            <button type="button" data-value="800" class="px-2 py-1 text-[10px] sm:text-xs border border-gray-300 text-gray-600 rounded transition-colors hover:bg-gray-100">800</button>
                        </div>
                        <div class="relative">
                            <input type="number" id="setting-size" value="1000" min="100" max="10000" class="w-full pl-3 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-sm">
                            <span class="absolute right-3 top-2.5 text-gray-400 text-sm">px</span>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-1">※指定より小さい画像は拡大しません</p>
                    </div>

                    <!-- 2. 接尾辞 -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-2">ファイル名の末尾</label>
                        <!-- プリセットボタン (接尾辞) -->
                        <div class="flex flex-wrap gap-1.5 mb-2" id="suffix-presets">
                            <button type="button" data-value="_resized" class="px-2 py-1 text-[10px] sm:text-xs border border-gray-300 text-gray-600 rounded transition-colors hover:bg-gray-100">_resized</button>
                            <button type="button" data-value="_small" class="px-2 py-1 text-[10px] sm:text-xs border border-gray-300 text-gray-600 rounded transition-colors hover:bg-gray-100">_small</button>
                        </div>
                        <input type="text" id="setting-suffix" value="" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm" placeholder="自由入力（例: _resized）">
                    </div>

                    <!-- 3. 画質設定 -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="block text-xs font-semibold text-gray-500">画質 (圧縮率)</label>
                            <span id="quality-value" class="text-xs font-bold text-indigo-600">90%</span>
                        </div>
                        <!-- プリセットボタン (画質) -->
                        <div class="flex flex-wrap gap-1.5 mb-2" id="quality-presets">
                            <button type="button" data-value="0.95" class="px-2 py-1 text-[10px] sm:text-xs border border-gray-300 text-gray-600 rounded transition-colors hover:bg-gray-100">高 95</button>
                            <button type="button" data-value="0.9" class="px-2 py-1 text-[10px] sm:text-xs border border-indigo-500 bg-indigo-50 text-indigo-700 rounded transition-colors font-medium">標準 90</button>
                            <button type="button" data-value="0.8" class="px-2 py-1 text-[10px] sm:text-xs border border-gray-300 text-gray-600 rounded transition-colors hover:bg-gray-100">軽量 80</button>
                        </div>
                        <input type="range" id="setting-quality" min="0.5" max="1.0" step="0.05" value="0.9" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                        <p class="text-[10px] text-gray-400 mt-1">※PNGは常に可逆圧縮（設定の影響なし）</p>
                    </div>

                    <!-- 4. 保存形式 -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-2">保存形式</label>
                        <select id="setting-format" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-sm h-[42px]">
                            <option value="original">元の形式を維持</option>
                            <option value="image/jpeg">JPEG (.jpg)</option>
                            <option value="image/png">PNG (.png)</option>
                            <option value="image/webp">WebP (.webp)</option>
                        </select>
                        <p class="text-[10px] text-gray-400 mt-1">※透過PNG→JPEGは白背景で合成</p>
                    </div>
                </div>
            </div>

            <!-- ドロップゾーン -->
            <div id="drop-zone"
                 class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer transition-all duration-300 bg-gray-50 hover:bg-gray-100 hover:border-indigo-300 group relative mb-6">

                <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*" multiple>

                <div class="pointer-events-none transform transition-transform group-hover:scale-105 duration-300">
                    <svg class="w-14 h-14 mx-auto text-gray-400 mb-3 group-hover:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p class="text-lg font-bold text-gray-600">画像をドラッグ＆ドロップ</p>
                    <div class="mt-3 text-sm text-gray-500 flex flex-wrap justify-center items-center gap-3">
                        <span>または クリックして選択</span>
                        <span class="text-gray-300">|</span>
                        <span>Command+V で貼り付け</span>
                    </div>
                </div>
            </div>

            <!-- エラーメッセージ -->
            <div id="error-msg" class="hidden mb-4 p-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="error-text"></span>
            </div>

            <!-- コントロールエリア -->
            <div id="controls-area" class="hidden flex flex-col sm:flex-row justify-between items-center mb-6 pb-4 border-b border-gray-100 gap-4">
                <div class="text-sm text-gray-500">
                    処理完了: <span id="count-display" class="font-bold text-indigo-600 text-lg">0</span> 枚
                </div>
                <div class="flex gap-3 w-full sm:w-auto">
                    <button onclick="downloadZip()" id="download-zip-btn" class="flex-1 sm:flex-none bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 px-6 rounded-lg shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        ZIPでまとめて保存
                    </button>
                    <button onclick="clearAll()" class="px-4 py-2.5 border border-gray-300 text-gray-600 rounded-lg hover:bg-gray-100 transition-colors font-medium text-sm">
                        クリア
                    </button>
                </div>
            </div>

            <!-- 結果リスト -->
            <div id="results-container" class="space-y-4"></div>

            <!-- ローディング -->
            <div id="loading" class="hidden mt-8 text-center py-6">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-100 border-t-indigo-600"></div>
                <p class="mt-3 text-sm font-medium text-gray-500">画像を処理中...</p>
            </div>
        </div>
    </div>

    <script>
        // DOM要素
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultsContainer = document.getElementById('results-container');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');
        const loading = document.getElementById('loading');
        const controlsArea = document.getElementById('controls-area');
        const countDisplay = document.getElementById('count-display');
        const downloadZipBtn = document.getElementById('download-zip-btn');

        // 設定要素
        const settingSize = document.getElementById('setting-size');
        const settingFormat = document.getElementById('setting-format');
        const settingQuality = document.getElementById('setting-quality');
        const qualityValue = document.getElementById('quality-value');
        const settingSuffix = document.getElementById('setting-suffix');
        const suffixPresets = document.querySelectorAll('#suffix-presets button');
        const sizePresets = document.querySelectorAll('#size-presets button');
        const qualityPresets = document.querySelectorAll('#quality-presets button');

        // 高品質リサイズエンジン（Pica: Lanczos3）
        // CDN読み込み失敗時は null となり、ステップダウン方式にフォールバック
        const picaInstance = (typeof window.pica === 'function') ? window.pica() : null;

        // ===== プリセットボタン共通制御 =====
        const ACTIVE_BTN = "px-2 py-1 text-[10px] sm:text-xs border border-indigo-500 bg-indigo-50 text-indigo-700 rounded transition-colors font-medium";
        const INACTIVE_BTN = "px-2 py-1 text-[10px] sm:text-xs border border-gray-300 text-gray-600 rounded transition-colors hover:bg-gray-100";

        function bindPresets(buttons, input, onChange) {
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.getAttribute('data-value');
                    input.value = val;
                    updatePresetStyles(buttons, val);
                    if (onChange) onChange(val);
                });
            });
            input.addEventListener('input', (e) => {
                updatePresetStyles(buttons, e.target.value);
                if (onChange) onChange(e.target.value);
            });
        }

        function updatePresetStyles(buttons, currentValue) {
            buttons.forEach(btn => {
                btn.className = (btn.getAttribute('data-value') === String(currentValue)) ? ACTIVE_BTN : INACTIVE_BTN;
            });
        }

        bindPresets(sizePresets, settingSize);
        bindPresets(suffixPresets, settingSuffix);
        bindPresets(qualityPresets, settingQuality, (val) => {
            qualityValue.textContent = `${Math.round(parseFloat(val) * 100)}%`;
        });

        let processedFiles = []; // { id, baseName, ext, fileName, url, blob, originalSize, originalBytes, newSize }

        // ===== ドラッグ&ドロップ =====
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-active'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-active'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files), false);

        // クリップボードからの貼り付け対応
        document.addEventListener('paste', handlePaste, false);

        function handlePaste(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            const files = [];

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    const blob = items[i].getAsFile();
                    files.push(blob);
                }
            }

            if (files.length > 0) {
                dropZone.classList.add('drag-active');
                setTimeout(() => dropZone.classList.remove('drag-active'), 200);
                handleFiles(files);
            }
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            if (files.length === 0) return;

            hideError();
            loading.classList.remove('hidden');
            controlsArea.classList.remove('hidden');

            const fileArray = Array.from(files).filter(file => {
                if (!file.type.startsWith('image/')) {
                    showError(`スキップ: ${file.name} (画像ではありません)`);
                    return false;
                }
                return true;
            });

            processFilesSequentially(fileArray);
            fileInput.value = '';
        }

        async function processFilesSequentially(files) {
            for (const file of files) {
                try {
                    await processImage(file);
                } catch (err) {
                    console.error(err);
                    showError(`エラー: ${file.name} の処理に失敗しました`);
                }
            }
            loading.classList.add('hidden');
        }

        // ===== 画像デコード =====
        // createImageBitmap: Exifの回転情報を正しく適用しつつ高速デコード
        async function processImage(file) {
            let source;
            try {
                source = await createImageBitmap(file, { imageOrientation: 'from-image' });
            } catch (e) {
                try {
                    // オプション非対応ブラウザ向け
                    source = await createImageBitmap(file);
                } catch (e2) {
                    // 最終フォールバック: Image要素
                    source = await loadViaImageElement(file);
                }
            }

            await resizeAndAppendResult(source, file.name, file.type, file.size);

            if (source.close) source.close(); // ImageBitmapのメモリ解放
        }

        function loadViaImageElement(file) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
                img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('画像の読み込みに失敗')); };
                img.src = url;
            });
        }

        // ===== 高品質リサイズ =====
        // 第一選択: Pica (Lanczos3 + アンシャープマスク)
        // フォールバック: ステップダウン方式
        async function highQualityResize(source, newWidth, newHeight) {
            const dest = document.createElement('canvas');
            dest.width = newWidth;
            dest.height = newHeight;

            if (picaInstance) {
                try {
                    await picaInstance.resize(source, dest, {
                        quality: 3,          // Lanczos3（最高品質）
                        alpha: true,         // 透過保持
                        unsharpAmount: 70,   // 縮小で失われる輪郭のコントラストを補正
                        unsharpRadius: 0.6,
                        unsharpThreshold: 2
                    });
                    return dest;
                } catch (e) {
                    console.warn('Picaリサイズに失敗。ステップダウン方式にフォールバックします。', e);
                }
            }

            // --- フォールバック: 段階的50%縮小 ---
            let tempCanvas = document.createElement('canvas');
            let cw = source.width;
            let ch = source.height;
            tempCanvas.width = cw;
            tempCanvas.height = ch;
            tempCanvas.getContext('2d').drawImage(source, 0, 0);

            while (cw > newWidth * 2) {
                const nextW = Math.round(cw * 0.5);
                const nextH = Math.round(ch * 0.5);
                const stepCanvas = document.createElement('canvas');
                stepCanvas.width = nextW;
                stepCanvas.height = nextH;
                const stepCtx = stepCanvas.getContext('2d');
                stepCtx.imageSmoothingEnabled = true;
                stepCtx.imageSmoothingQuality = 'high';
                stepCtx.drawImage(tempCanvas, 0, 0, cw, ch, 0, 0, nextW, nextH);
                tempCanvas = stepCanvas;
                cw = nextW;
                ch = nextH;
            }

            const ctx = dest.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(tempCanvas, 0, 0, cw, ch, 0, 0, newWidth, newHeight);
            return dest;
        }

        // ===== エンコード =====
        function canvasToBlob(canvas, type, quality) {
            return new Promise((resolve, reject) => {
                canvas.toBlob(
                    (blob) => blob ? resolve(blob) : reject(new Error('エンコードに失敗しました')),
                    type,
                    quality
                );
            });
        }

        async function resizeAndAppendResult(source, fileName, originalType, originalBytes) {
            // 1. サイズ計算（拡大はしない = 画質劣化防止）
            const targetSize = parseInt(settingSize.value) || 1000;
            const width = source.width;
            const height = source.height;
            const longEdge = Math.max(width, height);
            let newWidth, newHeight;

            if (longEdge <= targetSize) {
                // 元画像が指定サイズ以下 → 拡大せず等倍で再エンコードのみ
                newWidth = width;
                newHeight = height;
            } else if (width >= height) {
                newWidth = targetSize;
                newHeight = Math.round(height * (targetSize / width));
            } else {
                newHeight = targetSize;
                newWidth = Math.round(width * (targetSize / height));
            }

            // 2. フォーマットと画質の決定
            let outputType = settingFormat.value;
            if (outputType === 'original') {
                outputType = originalType === 'image/png' ? 'image/png' :
                             originalType === 'image/webp' ? 'image/webp' : 'image/jpeg';
            }
            const quality = parseFloat(settingQuality.value);

            // 3. リサイズ実行
            let resultCanvas;
            if (newWidth === width && newHeight === height) {
                // 等倍: リサンプリング処理をスキップ（無駄な劣化を回避）
                resultCanvas = document.createElement('canvas');
                resultCanvas.width = width;
                resultCanvas.height = height;
                resultCanvas.getContext('2d').drawImage(source, 0, 0);
            } else {
                resultCanvas = await highQualityResize(source, newWidth, newHeight);
            }

            // 4. 透過PNG/WebP → JPEG変換時は白背景で合成（黒つぶれ防止）
            if (outputType === 'image/jpeg') {
                const flat = document.createElement('canvas');
                flat.width = newWidth;
                flat.height = newHeight;
                const fctx = flat.getContext('2d');
                fctx.fillStyle = '#ffffff';
                fctx.fillRect(0, 0, newWidth, newHeight);
                fctx.drawImage(resultCanvas, 0, 0);
                resultCanvas = flat;
            }

            // 5. Blob生成（toDataURLより省メモリで安定）
            const blob = await canvasToBlob(resultCanvas, outputType, quality);
            const objectUrl = URL.createObjectURL(blob);

            // 6. ファイル名生成
            let baseName;
            if (fileName === 'image.png') {
                 const d = new Date();
                 baseName = `screenshot_${d.getHours()}${d.getMinutes()}${d.getSeconds()}`;
            } else {
                const nameParts = fileName.split('.');
                nameParts.pop(); // 拡張子除去
                baseName = nameParts.join('.');
            }

            // 拡張子の決定
            let ext = 'jpg';
            if (outputType === 'image/png') ext = 'png';
            if (outputType === 'image/webp') ext = 'webp';

            const suffix = settingSuffix.value;
            const newBaseName = `${baseName}${suffix}`;
            const newFileName = `${newBaseName}.${ext}`;

            // 配列に保存
            const fileId = Date.now() + Math.random();
            const fileData = {
                id: fileId,
                baseName: newBaseName,
                ext: ext,
                fileName: newFileName,
                url: objectUrl,
                blob: blob,
                originalSize: `${width}x${height}`,
                originalBytes: originalBytes,
                newSize: `${newWidth}x${newHeight}`,
                resized: !(newWidth === width && newHeight === height)
            };
            processedFiles.push(fileData);

            updateCount();
            renderResultItem(fileData);
        }

        function removeResult(id) {
            // objectURLを解放してから配列から削除
            const target = processedFiles.find(f => f.id === id);
            if (target && target.url) URL.revokeObjectURL(target.url);

            processedFiles = processedFiles.filter(f => f.id !== id);

            // DOMから削除
            const item = document.getElementById(`result-item-${id}`);
            if (item) {
                item.classList.add('fade-out');
                setTimeout(() => {
                    item.remove();
                    updateCount();
                    if (processedFiles.length === 0) {
                        controlsArea.classList.add('hidden');
                    }
                }, 200);
            } else {
                updateCount();
            }
        }

        function renderResultItem(fileData) {
            const div = document.createElement('div');
            div.id = `result-item-${fileData.id}`;
            div.className = "relative bg-white rounded-lg p-4 border border-gray-200 flex flex-col sm:flex-row items-center gap-4 fade-in shadow-sm hover:shadow-md transition-shadow group";

            // 削除ボタン
            const deleteBtn = `
                <button onclick="removeResult(${fileData.id})" class="absolute top-2 right-2 p-1.5 text-gray-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all" title="リストから削除">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            `;

            // 等倍処理（拡大回避）のバッジ
            const noResizeBadge = fileData.resized ? '' : `
                <span class="text-[10px] bg-amber-50 text-amber-600 border border-amber-200 px-1.5 py-0.5 rounded" title="元画像が指定サイズ以下のため拡大していません">等倍</span>
            `;

            div.innerHTML = deleteBtn + `
                <div class="w-20 h-20 bg-gray-100 rounded-md overflow-hidden flex-shrink-0 border border-gray-200 flex items-center justify-center">
                    <img src="${fileData.url}" class="max-w-full max-h-full object-contain">
                </div>
                <div class="flex-grow text-center sm:text-left min-w-0 w-full pr-6">
                    <div class="flex items-center gap-2 group/edit relative max-w-full justify-center sm:justify-start">
                        <div id="filename-display-container-${fileData.id}" class="flex items-center min-w-0" title="${fileData.fileName}">
                            <span id="filename-display-${fileData.id}" class="font-bold text-gray-700 text-sm truncate">${fileData.baseName}</span>
                            <span class="font-bold text-gray-700 text-sm">.${fileData.ext}</span>
                        </div>

                        <div id="filename-input-container-${fileData.id}" class="hidden items-center w-full min-w-0 max-w-[200px]">
                            <input type="text" id="filename-input-${fileData.id}" class="text-sm border border-indigo-300 rounded px-2 py-1 w-full focus:outline-none focus:ring-1 focus:ring-indigo-500" value="${fileData.baseName}">
                            <span class="text-gray-600 text-sm ml-1">.${fileData.ext}</span>
                        </div>

                        <button onclick="startEditFileName(${fileData.id})" id="filename-edit-btn-${fileData.id}" class="flex-shrink-0 text-gray-400 hover:text-indigo-600 opacity-0 group-hover/edit:opacity-100 transition-opacity p-1" title="ファイル名を編集">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button onclick="saveFileName(${fileData.id})" id="filename-save-btn-${fileData.id}" class="hidden flex-shrink-0 text-green-600 hover:text-green-700 ml-1 p-1 bg-green-50 rounded" title="保存">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                    </div>
                    <div class="flex flex-wrap items-center justify-center sm:justify-start gap-2 text-xs text-gray-500 mt-2">
                        <!-- Before -->
                        <div class="flex items-center bg-gray-100 px-2 py-1 rounded border border-gray-200">
                            <span class="font-medium">${fileData.originalSize}</span>
                            <span class="ml-2 pl-2 border-l border-gray-300 text-gray-500">${formatBytes(fileData.originalBytes)}</span>
                        </div>

                        <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>

                        <!-- After -->
                        <div class="flex items-center bg-indigo-50 text-indigo-700 border border-indigo-100 px-2 py-1 rounded">
                            <span class="font-bold">${fileData.newSize}</span>
                            <span class="ml-2 pl-2 border-l border-indigo-200 text-indigo-600">${formatBytes(fileData.blob.size)}</span>
                        </div>
                        ${noResizeBadge}
                    </div>
                </div>
                <div class="flex-shrink-0 w-full sm:w-auto mt-3 sm:mt-0">
                    <a id="download-btn-${fileData.id}" href="${fileData.url}" download="${fileData.fileName}" class="flex items-center justify-center w-full sm:w-auto px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-indigo-600 transition-colors">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        個別保存
                    </a>
                </div>
            `;
            resultsContainer.insertBefore(div, resultsContainer.firstChild);
        }

        function startEditFileName(id) {
            document.getElementById(`filename-display-container-${id}`).classList.add('hidden');
            document.getElementById(`filename-edit-btn-${id}`).classList.add('hidden');

            const inputContainer = document.getElementById(`filename-input-container-${id}`);
            inputContainer.classList.remove('hidden');
            inputContainer.classList.add('flex');

            const saveBtn = document.getElementById(`filename-save-btn-${id}`);
            saveBtn.classList.remove('hidden');

            const input = document.getElementById(`filename-input-${id}`);
            input.focus();
            input.setSelectionRange(0, input.value.length);

            input.onkeydown = function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveFileName(id);
                } else if (e.key === 'Escape') {
                    cancelEditFileName(id);
                }
            };
        }

        function cancelEditFileName(id) {
            const file = processedFiles.find(f => f.id === id);
            if (!file) return;

            document.getElementById(`filename-input-${id}`).value = file.baseName;

            document.getElementById(`filename-input-container-${id}`).classList.add('hidden');
            document.getElementById(`filename-input-container-${id}`).classList.remove('flex');
            document.getElementById(`filename-save-btn-${id}`).classList.add('hidden');

            document.getElementById(`filename-display-container-${id}`).classList.remove('hidden');
            document.getElementById(`filename-edit-btn-${id}`).classList.remove('hidden');
        }

        function saveFileName(id) {
            const input = document.getElementById(`filename-input-${id}`);
            let newBaseName = input.value.trim();

            if (!newBaseName) {
                cancelEditFileName(id);
                return;
            }

            const fileIndex = processedFiles.findIndex(f => f.id === id);
            if (fileIndex === -1) return;

            const file = processedFiles[fileIndex];
            file.baseName = newBaseName;
            file.fileName = `${newBaseName}.${file.ext}`;

            const displaySpan = document.getElementById(`filename-display-${id}`);
            displaySpan.textContent = newBaseName;
            document.getElementById(`filename-display-container-${id}`).title = file.fileName;

            const downloadBtn = document.getElementById(`download-btn-${id}`);
            if (downloadBtn) {
                downloadBtn.download = file.fileName;
            }

            document.getElementById(`filename-input-container-${id}`).classList.add('hidden');
            document.getElementById(`filename-input-container-${id}`).classList.remove('flex');
            document.getElementById(`filename-save-btn-${id}`).classList.add('hidden');

            document.getElementById(`filename-display-container-${id}`).classList.remove('hidden');
            document.getElementById(`filename-edit-btn-${id}`).classList.remove('hidden');
        }

        function updateCount() {
            countDisplay.textContent = processedFiles.length;
            if (processedFiles.length > 1) {
                downloadZipBtn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                    ZIPでまとめて保存 (${processedFiles.length})
                `;
            } else {
                downloadZipBtn.innerHTML = `
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    ZIPでまとめて保存
                `;
            }
        }

        function clearAll() {
            // objectURLを全て解放（メモリリーク防止）
            processedFiles.forEach(f => { if (f.url) URL.revokeObjectURL(f.url); });
            processedFiles = [];
            resultsContainer.innerHTML = '';
            controlsArea.classList.add('hidden');
            hideError();
            fileInput.value = '';
        }

        async function downloadZip() {
            if (processedFiles.length === 0) return;

            const originalText = downloadZipBtn.innerHTML;
            downloadZipBtn.disabled = true;
            downloadZipBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                圧縮中...
            `;

            try {
                const zip = new JSZip();
                const nameMap = {};

                processedFiles.forEach(file => {
                    let fileName = file.fileName;

                    if (nameMap[fileName]) {
                        nameMap[fileName]++;
                        const parts = fileName.split('.');
                        const ext = parts.pop();
                        const base = parts.join('.');
                        fileName = `${base}_(${nameMap[file.fileName]}).${ext}`;
                    } else {
                        nameMap[fileName] = 0;
                    }

                    zip.file(fileName, file.blob);
                });

                const content = await zip.generateAsync({type: "blob"});

                const date = new Date();
                const timestamp = date.getFullYear().toString() +
                    (date.getMonth() + 1).toString().padStart(2, '0') +
                    date.getDate().toString().padStart(2, '0') + '_' +
                    date.getHours().toString().padStart(2, '0') +
                    date.getMinutes().toString().padStart(2, '0');

                saveAs(content, `resized_images_${timestamp}.zip`);

            } catch (err) {
                console.error(err);
                showError("ZIPファイルの作成に失敗しました。");
            } finally {
                setTimeout(() => {
                    downloadZipBtn.innerHTML = originalText;
                    downloadZipBtn.disabled = false;
                }, 500);
            }
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            errorMsg.classList.add('hidden');
        }

        function formatBytes(bytes, decimals = 1) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }
    </script>
</body>
